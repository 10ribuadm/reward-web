<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NontonHepi - Reward System</title>
    <!-- Menggunakan Firebase Realtime Database sesuai permintaan -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #6200ee; margin-bottom: 10px; font-size: 1.5rem; }
        .video-box {
            position: relative;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            margin-bottom: 20px;
        }
        video { width: 100%; display: block; }
        .stats {
            font-size: 1.2rem;
            margin-bottom: 20px;
            padding: 10px;
            background: #e8eaf6;
            border-radius: 8px;
        }
        #points { font-weight: bold; color: #2e7d32; }
        #user-info { font-size: 0.8rem; color: #666; margin-bottom: 10px; }
        .btn-claim {
            background-color: #03dac6;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: none; /* Muncul setelah video selesai */
        }
        .btn-claim:hover { background-color: #018786; }
        .instruction { font-size: 0.9rem; color: #666; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>NontonHepi</h1>
        <p id="user-info">Memeriksa status login...</p>

        <p class="instruction">Tonton video sampai habis untuk mendapatkan poin!</p>

        <div class="video-box">
            <!-- Kontrol video dihapus untuk mencegah kecurangan -->
            <video id="rewardVideo" playsinline>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Browser Anda tidak mendukung tag video.
            </video>
        </div>

        <div class="stats">
            Poin Anda: <span id="points">0</span>
        </div>

        <button id="claimBtn" class="btn-claim" onclick="claimReward()">🎉 Ambil 10 Poin! 🎉</button>
    </div>

    <script>
        // === KONFIGURASI FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyD_5ct08uYoMVSualfGPW8Oiq4y7C9SzJc",
            authDomain: "nontonhepi-4d7a9.firebaseapp.com",
            databaseURL: "https://nontonhepi-4d7a9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "nontonhepi-4d7a9",
            storageBucket: "nontonhepi-4d7a9.appspot.com",
            messagingSenderId: "413442384337",
            appId: "1:413442384337:web:af92bdc26bc0adb32440f0",
            measurementId: "G-PV4T810FRW"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database(); // Menggunakan Realtime Database

        const video = document.getElementById('rewardVideo');
        const pointsDisplay = document.getElementById('points');
        const claimBtn = document.getElementById('claimBtn');
        const userInfo = document.getElementById('user-info');

        let currentUser = null;
        let lastTime = 0;
        let hasClaimed = false; // Mencegah klaim ganda

        // --- AUTHENTICATION & USER HANDLING ---
        auth.onAuthStateChanged(user => {
            if (user) {
                // Pengguna sudah login (atau sesi sebelumnya ada)
                currentUser = user;
                userInfo.innerText = `ID Pengguna: ${user.uid.substring(0, 8)}...`;
                loadUserPoints(user.uid);
            } else {
                // Login sebagai pengguna anonim jika belum ada sesi
                auth.signInAnonymously().catch(error => {
                    console.error("Gagal login anonim:", error);
                    userInfo.innerText = "Gagal terhubung. Coba refresh halaman.";
                });
            }
        });

        // --- REALTIME DATABASE LOGIC ---
        function loadUserPoints(uid) {
            db.ref('users/' + uid).on('value', (snapshot) => {
                const data = snapshot.val();
                const userPoints = data ? data.points : 0;
                pointsDisplay.innerText = userPoints;
                 if (!data) {
                    // Buat data baru jika pengguna belum ada di database
                    db.ref('users/' + uid).set({ points: 0 });
                }
            });
        }

        function savePoints(uid, pointsToAdd) {
            const userRef = db.ref('users/' + uid);
            userRef.child('points').transaction((currentPoints) => {
                return (currentPoints || 0) + pointsToAdd;
            });
        }

        // --- VIDEO & REWARD LOGIC ---
        // Mulai video saat di-tap
        video.addEventListener('click', () => {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        });

        // Mencegah video di-skip
        video.addEventListener('timeupdate', () => {
            // Jika pengguna mencoba melompat ke depan, kembalikan
            if (video.currentTime > lastTime + 1) {
                video.currentTime = lastTime;
            }
            lastTime = video.currentTime;
        });

        // Tampilkan tombol klaim saat video selesai
        video.addEventListener('ended', () => {
            if (!hasClaimed) {
                claimBtn.style.display = 'block';
                alert("Video Selesai! Klik tombol untuk mengambil hadiahmu.");
            }
        });
        
        // Reset state jika video diputar ulang
        video.addEventListener('play', () => {
            claimBtn.style.display = 'none';
            hasClaimed = false;
        });

        // Fungsi untuk klaim hadiah
        function claimReward() {
            if (currentUser && !hasClaimed) {
                hasClaimed = true; // Tandai sudah klaim
                savePoints(currentUser.uid, 10);
                alert("Selamat! 10 Poin berhasil ditambahkan.");
                claimBtn.style.display = 'none'; // Sembunyikan tombol lagi
            }
        }
    </script>
</body>
</html>
