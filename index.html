<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NontonHepi - Reward System</title>
    <!-- Menggunakan Firebase Realtime Database sesuai permintaan -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            position: relative; /* Diperlukan untuk overlay */
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 15px;
            font-weight: bold;
            color: #6200ee;
        }
        h1 { color: #6200ee; margin-bottom: 10px; font-size: 1.5rem; }
        .video-box {
            position: relative;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            margin-bottom: 20px;
        }
        video { width: 100%; display: block; }
        .stats {
            font-size: 1.2rem;
            margin-bottom: 20px;
            padding: 10px;
            background: #e8eaf6;
            border-radius: 8px;
        }
        #points { font-weight: bold; color: #2e7d32; }
        #user-info { font-size: 0.8rem; color: #666; margin-bottom: 10px; }
        .btn-claim {
            background-color: #03dac6;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: none; /* Muncul setelah video selesai */
        }
        .btn-claim:hover { background-color: #018786; }
        .instruction { font-size: 0.9rem; color: #666; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loadingOverlay">
            <p>Menyambungkan ke server...</p>
        </div>

        <h1>NontonHepi</h1>
        <p id="user-info">Memeriksa status login...</p>

        <p class="instruction">Tonton video sampai habis untuk mendapatkan poin!</p>

        <!-- Video dinonaktifkan secara default -->
        <div id="videoBox" class="video-box" style="pointer-events: none; opacity: 0.5;">
            <video id="rewardVideo" playsinline>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Browser Anda tidak mendukung tag video.
            </video>
        </div>

        <div class="stats">
            Poin Anda: <span id="points">0</span>
        </div>

        <button id="claimBtn" class="btn-claim" onclick="claimReward()">🎉 Ambil 10 Poin! 🎉</button>
    </div>

    <script>
        // === KONFIGURASI FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyD_5ct08uYoMVSualfGPW8Oiq4y7C9SzJc",
            authDomain: "nontonhepi-4d7a9.firebaseapp.com",
            databaseURL: "https://nontonhepi-4d7a9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "nontonhepi-4d7a9",
            storageBucket: "nontonhepi-4d7a9.appspot.com",
            messagingSenderId: "413442384337",
            appId: "1:413442384337:web:af92bdc26bc0adb32440f0",
            measurementId: "G-PV4T810FRW"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Elemen UI
        const video = document.getElementById('rewardVideo');
        const pointsDisplay = document.getElementById('points');
        const claimBtn = document.getElementById('claimBtn');
        const userInfo = document.getElementById('user-info');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const videoBox = document.getElementById('videoBox');

        let currentUser = null;
        let lastTime = 0;
        let hasClaimed = false;

        // --- AUTHENTICATION & USER HANDLING ---
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log("onAuthStateChanged: Pengguna ditemukan!", user);
                currentUser = user;
                userInfo.innerText = `ID Pengguna: ${user.uid.substring(0, 8)}...`;
                
                // AKTIFKAN UI SETELAH LOGIN BERHASIL
                loadingOverlay.style.display = 'none';
                videoBox.style.pointerEvents = 'auto';
                videoBox.style.opacity = '1';

                loadUserPoints(user.uid);
            } else {
                console.log("onAuthStateChanged: Tidak ada pengguna, mencoba login anonim...");
                auth.signInAnonymously().catch(error => {
                    console.error("Gagal login anonim:", error);
                    userInfo.innerText = "Gagal terhubung. Coba refresh halaman.";
                    loadingOverlay.innerHTML = "<p>Gagal terhubung ke server.<br>Silakan refresh halaman.</p>";
                });
            }
        });

        // --- REALTIME DATABASE LOGIC ---
        function loadUserPoints(uid) {
            db.ref('users/' + uid).on('value', (snapshot) => {
                const data = snapshot.val();
                const userPoints = data ? data.points : 0;
                pointsDisplay.innerText = userPoints;
                 if (!data) {
                    db.ref('users/' + uid).set({ points: 0 });
                }
            });
        }

        function savePoints(uid, pointsToAdd) {
            const userRef = db.ref('users/' + uid + '/points');
            console.log("Memulai transaksi pada ref:", userRef.toString());

            userRef.transaction((currentPoints) => {
                const newPoints = (currentPoints || 0) + pointsToAdd;
                console.log("Di dalam transaksi. Poin saat ini:", currentPoints, "Poin baru:", newPoints);
                return newPoints;
            }, (error, committed, snapshot) => {
                if (error) {
                    console.error('Transaksi GAGAL:', error);
                    alert('Gagal menyimpan poin. Terjadi kesalahan: ' + error);
                } else if (!committed) {
                    console.warn('Transaksi tidak berhasil di-commit.');
                } else {
                    console.log('Transaksi BERHASIL! Poin sekarang:', snapshot.val());
                }
            });
        }

        // --- VIDEO & REWARD LOGIC ---
        video.addEventListener('click', () => {
            if (video.paused) { video.play(); } else { video.pause(); }
        });

        video.addEventListener('timeupdate', () => {
            if (video.currentTime > lastTime + 1) { video.currentTime = lastTime; }
            lastTime = video.currentTime;
        });

        video.addEventListener('ended', () => {
            if (!hasClaimed) {
                claimBtn.style.display = 'block';
                alert("Video Selesai! Klik tombol untuk mengambil hadiahmu.");
            }
        });
        
        video.addEventListener('play', () => {
            claimBtn.style.display = 'none';
            hasClaimed = false;
        });

        function claimReward() {
            console.log("claimReward dipanggil. currentUser:", currentUser, "hasClaimed:", hasClaimed);
            if (currentUser && !hasClaimed) {
                hasClaimed = true;
                console.log("Memanggil savePoints untuk user:", currentUser.uid);
                savePoints(currentUser.uid, 10);
                alert("Selamat! 10 Poin telah ditambahkan.");
                claimBtn.style.display = 'none';
            } else {
                console.error("Tidak bisa klaim. Pengguna belum login atau sudah pernah klaim.");
                if (!currentUser) alert("Error: Pengguna tidak ditemukan. Silakan refresh halaman.");
            }
        }
    </script>
</body>
</html>
