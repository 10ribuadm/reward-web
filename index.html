<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NontonAsik - Premium Vertical</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2fe;
            --premium-red: #fe2c55;
        }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; color: white; }
        
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { position: relative; background: #000; overflow: hidden; }

        /* Video MP4 Full Screen */
        video {
            width: 100%; height: 100%; object-fit: cover; /* Menjamin Full Layar HP */
            position: absolute; top: 0; left: 0;
        }

        /* UI Minimalis & Keren */
        .overlay-ui {
            position: absolute; inset: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.4) 0%, transparent 30%, rgba(0,0,0,0.3) 100%);
            z-index: 10; display: flex; flex-direction: column; justify-content: space-between;
            padding: 25px; pointer-events: none;
        }

        .header { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .badge-point { background: rgba(0,0,0,0.5); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 50px; color: var(--accent); font-weight: bold; }

        .info-bottom { margin-bottom: 20px; pointer-events: auto; }
        .info-bottom h5 { margin: 0; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .info-bottom p { font-size: 0.9rem; opacity: 0.8; margin: 5px 0 0; }

        /* Tombol Klaim Mewah */
        .btn-claim {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(45deg, var(--accent), #4facfe); color: #000;
            border: none; padding: 18px 35px; border-radius: 50px; font-weight: 800;
            z-index: 100; display: none; pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.4);
        }

        /* Layar Awal (Unlock Audio) */
        #gatekeeper {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .play-ring {
            width: 80px; height: 80px; border: 3px solid var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }
    </style>
</head>
<body>

<div id="gatekeeper" onclick="unlockApp()">
    <div class="play-ring"><i class="fas fa-play fa-2x" style="color:var(--accent)"></i></div>
    <h4 class="mt-4">NontonAsik Premium</h4>
    <p class="small opacity-50">Ketuk untuk Memulai</p>
</div>

<div class="swiper mySwiper">
    <div class="swiper-wrapper" id="video-content">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    // === CONFIG FIREBASE ASRUL ===
    const firebaseConfig = {
        apiKey: "AIzaSyD_5ct08uYoMVSualfGPW8Oiq4y7C9SzJc",
        authDomain: "nontonhepi-4d7a9.firebaseapp.com",
        databaseURL: "https://nontonhepi-4d7a9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nontonhepi-4d7a9",
        storageBucket: "nontonhepi-4d7a9.appspot.com",
        messagingSenderId: "413442384337",
        appId: "1:413442384337:web:af92bdc26bc0adb32440f0",
        measurementId: "G-PV4T810FRW"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // List 10 Video Creative Commons (MP4 Direct Link)
    const videos = [
        { url: "https://v1.pexels.com/video-files/3571264/3571264-uhd_1440_2560_30fps.mp4", title: "Pemandangan Estetik #1" },
        { url: "https://v1.pexels.com/video-files/5192103/5192103-uhd_1440_2560_30fps.mp4", title: "Momen Santai #2" },
        { url: "https://v1.pexels.com/video-files/2811442/2811442-uhd_1440_2560_24fps.mp4", title: "Gaya Hidup Modern #3" },
        { url: "https://v1.pexels.com/video-files/3855325/3855325-uhd_1440_2732_25fps.mp4", title: "Teknologi Masa Depan #4" },
        { url: "https://v1.pexels.com/video-files/4057321/4057321-uhd_1440_2560_25fps.mp4", title: "Wisata Alam #5" },
        { url: "https://v1.pexels.com/video-files/4443653/4443653-uhd_1440_2560_24fps.mp4", title: "Kopi & Inspirasi #6" },
        { url: "https://v1.pexels.com/video-files/4311029/4311029-uhd_1440_2560_25fps.mp4", title: "Petualangan Seru #7" },
        { url: "https://v1.pexels.com/video-files/4125864/4125864-uhd_1440_2560_24fps.mp4", title: "Hobi & Kreativitas #8" },
        { url: "https://v1.pexels.com/video-files/3951119/3951119-uhd_1440_2560_25fps.mp4", title: "Kota Malam Hari #9" },
        { url: "https://v1.pexels.com/video-files/5377684/5377684-uhd_1440_2560_25fps.mp4", title: "Ekspresi Bahagia #10" }
    ];

    const wrapper = document.getElementById('video-content');
    videos.forEach((v, i) => {
        wrapper.innerHTML += `
            <div class="swiper-slide">
                <video id="vid-${i}" playsinline loop>
                    <source src="${v.url}" type="video/mp4">
                </video>
                <div class="overlay-ui">
                    <div class="header">
                        <h4 class="m-0 fw-bold">Nonton<span style="color:var(--accent)">Asik</span></h4>
                        <div class="badge-point"><i class="fas fa-wallet me-1"></i> <span class="pts-val">0</span></div>
                    </div>
                    <div class="info-bottom">
                        <h5>${v.title}</h5>
                        <p>Tonton 15 detik untuk dapatkan hadiah!</p>
                    </div>
                </div>
                <button class="btn-claim" id="claim-${i}" onclick="claimPoin('${i}')">💎 AMBIL 10 POIN</button>
            </div>`;
    });

    let swiper;
    function unlockApp() {
        document.getElementById('gatekeeper').style.display = 'none';
        initSwiper();
        playActiveVideo(0);
    }

    function initSwiper() {
        swiper = new Swiper(".mySwiper", {
            direction: "vertical",
            on: {
                slideChange: function() {
                    stopAllVideos();
                    playActiveVideo(swiper.activeIndex);
                }
            }
        });
    }

    function playActiveVideo(index) {
        const v = document.getElementById(`vid-${index}`);
        if(v) {
            v.play();
            // Cek durasi tonton agar tidak bisa skip
            setTimeout(() => {
                document.getElementById(`claim-${index}`).style.display = 'block';
            }, 10000); // Muncul setelah 10 detik tonton
        }
    }

    function stopAllVideos() {
        document.querySelectorAll('video').forEach(v => {
            v.pause();
            v.currentTime = 0;
        });
        document.querySelectorAll('.btn-claim').forEach(b => b.style.display = 'none');
    }

    // === FIREBASE LOGIC ===
    auth.onAuthStateChanged(user => {
        if (user) { loadPoints(user.uid); }
        else { auth.signInAnonymously(); }
    });

    function loadPoints(uid) {
        db.ref('users/' + uid).on('value', snap => {
            const p = snap.val() ? snap.val().points : 0;
            document.querySelectorAll('.pts-val').forEach(el => el.innerText = p);
        });
    }

    function claimPoin(index) {
        const user = auth.currentUser;
        if (user) {
            db.ref('users/' + user.uid + '/points').transaction(c => (c || 0) + 10)
            .then(() => {
                document.getElementById(`claim-${index}`).style.display = 'none';
                swiper.slideNext();
            });
        }
    }
</script>
</body>
</html>
