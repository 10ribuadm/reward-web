<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NontonAsik - Premium Vertical</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2fe;
            --premium-red: #fe2c55;
            --dark-bg: #0a0a0a;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--dark-bg); font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; color: white; 
        }
        
        /* Swiper Container */
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { position: relative; background: #000; overflow: hidden; }

        /* Video MP4 Styling */
        video {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
        }

        /* UI Overlay */
        .overlay-ui {
            position: absolute; inset: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 40%, rgba(0,0,0,0.3) 100%);
            z-index: 10; display: flex; flex-direction: column; justify-content: space-between;
            padding: 25px; pointer-events: none;
        }

        .header { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; margin-top: 10px; }
        .badge-point { 
            background: rgba(0,0,0,0.6); border: 1px solid var(--accent); 
            padding: 8px 15px; border-radius: 50px; color: var(--accent); 
            font-weight: bold; backdrop-filter: blur(5px);
        }

        .info-bottom { margin-bottom: 30px; pointer-events: auto; }
        .info-bottom h5 { margin: 0; font-size: 1.2rem; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .info-bottom p { font-size: 0.9rem; opacity: 0.9; margin: 8px 0 0; }

        /* Tombol Klaim */
        .btn-claim {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(45deg, var(--accent), #4facfe); color: #000;
            border: none; padding: 18px 30px; border-radius: 50px; font-weight: 800;
            z-index: 100; display: none; pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.5);
            cursor: pointer; transition: transform 0.2s;
        }
        .btn-claim:active { transform: translate(-50%, -50%) scale(0.9); }

        /* Gatekeeper (Layar Start) */
        #gatekeeper {
            position: fixed; inset: 0; background: var(--dark-bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
        .play-ring {
            width: 90px; height: 90px; border: 3px solid var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
        }
        .play-ring::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            border: 2px solid var(--accent); border-radius: 50%;
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
    </style>
</head>
<body>

<div id="gatekeeper" onclick="unlockApp()">
    <div class="play-ring"><i class="fas fa-play fa-2x" style="color:var(--accent); margin-left: 5px;"></i></div>
    <h3 style="margin-top: 25px; letter-spacing: 1px;">NontonAsik Premium</h3>
    <p style="opacity: 0.6;">Ketuk untuk mulai menonton & hasilkan poin</p>
</div>

<div class="swiper mySwiper">
    <div class="swiper-wrapper" id="video-content">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    // === CONFIG FIREBASE ===
    const firebaseConfig = {
        apiKey: "AIzaSyD_5ct08uYoMVSualfGPW8Oiq4y7C9SzJc",
        authDomain: "nontonhepi-4d7a9.firebaseapp.com",
        databaseURL: "https://nontonhepi-4d7a9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nontonhepi-4d7a9",
        storageBucket: "nontonhepi-4d7a9.appspot.com",
        messagingSenderId: "413442384337",
        appId: "1:413442384337:web:af92bdc26bc0adb32440f0",
        measurementId: "G-PV4T810FRW"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Link Video Menggunakan URL RAW GitHub
    const videoUrl = "https://raw.githubusercontent.com/10ribuadm/reward-web/main/video/tes.mp4";
    const videos = [
        { url: videoUrl, title: "Pemandangan Estetik #1" },
        { url: videoUrl, title: "Momen Santai #2" },
        { url: videoUrl, title: "Gaya Hidup Modern #3" },
        { url: videoUrl, title: "Teknologi Masa Depan #4" },
        { url: videoUrl, title: "Wisata Alam #5" }
    ];

    const wrapper = document.getElementById('video-content');
    
    // Render Slides
    videos.forEach((v, i) => {
        wrapper.innerHTML += `
            <div class="swiper-slide">
                <video id="vid-${i}" playsinline loop muted>
                    <source src="${v.url}" type="video/mp4">
                </video>
                <div class="overlay-ui">
                    <div class="header">
                        <h4 class="m-0 fw-bold">Nonton<span style="color:var(--accent)">Asik</span></h4>
                        <div class="badge-point"><i class="fas fa-gem me-1"></i> <span class="pts-val">0</span></div>
                    </div>
                    <div class="info-bottom">
                        <h5>${v.title}</h5>
                        <p><i class="fas fa-clock me-1"></i> Tonton 10 detik untuk klaim hadiah!</p>
                    </div>
                </div>
                <button class="btn-claim" id="claim-${i}" onclick="claimPoin('${i}')">💎 AMBIL 10 POIN</button>
            </div>`;
    });

    let swiper;
    let claimTimers = {};

    function unlockApp() {
        document.getElementById('gatekeeper').style.fadeOut = "fast";
        document.getElementById('gatekeeper').style.display = 'none';
        initSwiper();
        playActiveVideo(0);
    }

    function initSwiper() {
        swiper = new Swiper(".mySwiper", {
            direction: "vertical",
            mousewheel: true,
            on: {
                slideChange: function() {
                    stopAllVideos();
                    playActiveVideo(swiper.activeIndex);
                }
            }
        });
    }

    function playActiveVideo(index) {
        const v = document.getElementById(`vid-${index}`);
        if(v) {
            v.muted = false; // Unmute setelah interaksi user
            v.play().catch(e => console.log("Autoplay dicegah: ", e));
            
            // Logika Timer Hadiah
            clearTimeout(claimTimers[index]);
            claimTimers[index] = setTimeout(() => {
                document.getElementById(`claim-${index}`).style.display = 'block';
            }, 10000); // Muncul setelah 10 detik
        }
    }

    function stopAllVideos() {
        document.querySelectorAll('video').forEach(v => {
            v.pause();
            v.currentTime = 0;
        });
        document.querySelectorAll('.btn-claim').forEach(b => b.style.display = 'none');
    }

    // === FIREBASE INTEGRATION ===
    auth.onAuthStateChanged(user => {
        if (user) { loadPoints(user.uid); }
        else { auth.signInAnonymously(); }
    });

    function loadPoints(uid) {
        db.ref('users/' + uid).on('value', snap => {
            const p = snap.val() ? snap.val().points : 0;
            document.querySelectorAll('.pts-val').forEach(el => el.innerText = p);
        });
    }

    function claimPoin(index) {
        const user = auth.currentUser;
        if (user) {
            db.ref('users/' + user.uid + '/points').transaction(c => (c || 0) + 10)
            .then(() => {
                document.getElementById(`claim-${index}`).style.display = 'none';
                alert("Selamat! +10 Poin berhasil masuk.");
                swiper.slideNext();
            });
        }
    }
</script>
</body>
</html>
