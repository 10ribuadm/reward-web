<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NontonHepi - HD Shorts</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #03dac6; --primary: #6200ee; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        .video-wrapper { position: relative; width: 100%; height: 100vh; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .ui-overlay { position: absolute; bottom: 0; width: 100%; padding: 40px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); pointer-events: none; }
        .btn-claim { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent); color: #000; border: none; padding: 18px 35px; border-radius: 50px; font-weight: 800; display: none; z-index: 100; box-shadow: 0 0 20px var(--accent); }
        .wallet { position: absolute; top: 40px; right: 20px; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--accent); display: flex; align-items: center; gap: 8px; font-weight: bold; }
        #error-msg { position: absolute; color: red; font-size: 0.8rem; bottom: 10px; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div class="video-wrapper" onclick="togglePlay()">
    <video id="mainVideo" playsinline loop>
        <source id="videoSource" src="https://player.vimeo.com/external/370331493.sd.mp4?s=7b231972d3e51086432b270a3c20c025d5760ef1&profile_id=139&oauth2_token_id=57447761" type="video/mp4">
    </video>
    
    <div class="wallet"><i class="fas fa-coins" style="color: gold;"></i> <span id="pts-val">0</span> Poin</div>
    <button id="claimBtn" class="btn-claim" onclick="claimReward()">💰 KLAIM 10 POIN</button>
    <div class="ui-overlay">
        <h3 id="videoTitle">@NontonHepi_Original</h3>
        <p id="videoDesc">Video pendek seru setiap hari untuk kamu! 🚀</p>
    </div>
    <div id="error-msg"></div>
</div>

<script>
    // === FIREBASE CONFIG (SAMA SEPERTI SEBELUMNYA) ===
    const firebaseConfig = {
        apiKey: "AIzaSyD_5ct08uYoMVSualfGPW8Oiq4y7C9SzJc",
        authDomain: "nontonhepi-4d7a9.firebaseapp.com",
        databaseURL: "https://nontonhepi-4d7a9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nontonhepi-4d7a9",
        storageBucket: "nontonhepi-4d7a9.appspot.com",
        messagingSenderId: "413442384337",
        appId: "1:413442384337:web:af92bdc26bc0adb32440f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const video = document.getElementById('mainVideo');
    const claimBtn = document.getElementById('claimBtn');
    let userId = null;

    // Pastikan video autoplay saat web dibuka
    window.onload = () => { video.play().catch(e => console.log("Autoplay blocked")); };

    video.onerror = () => { document.getElementById('error-msg').innerText = "Gagal memuat video. Mencoba link lain..."; };

    // Tampilkan tombol klaim setelah video berjalan 10 detik (agar tidak terlalu lama)
    video.ontimeupdate = () => {
        if (video.currentTime > 10) { claimBtn.style.display = 'block'; }
    };

    function togglePlay() { video.paused ? video.play() : video.pause(); }

    auth.onAuthStateChanged(user => {
        if (user) { 
            userId = user.uid;
            db.ref('users/' + userId + '/points').on('value', snap => {
                document.getElementById('pts-val').innerText = snap.val() || 0;
            });
        } else { auth.signInAnonymously(); }
    });

    function claimReward() {
        if (userId) {
            db.ref('users/' + userId + '/points').transaction(c => (c || 0) + 10)
            .then(() => {
                alert("🎉 Poin Berhasil Ditambahkan!");
                claimBtn.style.display = 'none';
                video.currentTime = 0; // Ulang video
                video.play();
            });
        }
    }
</script>
</body>
</html>
