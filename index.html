<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NontonAsik - Full Screen Reward</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --accent: #00f2fe;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Mencegah scroll bodi utama */
            height: 100vh;
        }

        /* Container Utama */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px; /* Limit lebar untuk tampilan mobile di PC */
            margin: 0 auto;
            position: relative;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        }

        /* Header Statis */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .points-badge {
            background: var(--glass);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: 700;
        }

        /* Konten Scrollable */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px; /* Space untuk Navbar */
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Card Style */
        .card-asik {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        /* Bottom Navbar */
        .bottom-nav {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-item {
            color: #64748b;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--accent);
            transform: translateY(-5px);
        }

        .nav-item i { font-size: 1.5rem; }
        .nav-item span { display: block; font-size: 0.7rem; margin-top: 5px; }

        /* Video Iframe Wrapper */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 15px;
            overflow: hidden;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Custom Scrollbar */
        .content-area::-webkit-scrollbar { width: 5px; }
        .content-area::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <h4 class="m-0 fw-bold">Nonton<span style="color:var(--accent)">Asik</span></h4>
        <div class="points-badge">
            <i class="fas fa-coins me-1"></i> <span id="user-points">0</span>
        </div>
    </header>

    <div class="content-area">
        <div id="tab-video" class="tab-content active animate__animated animate__fadeIn">
            <h5 class="mb-3">Tonton & Dapat Poin</h5>
            <div class="card-asik p-0">
                <div class="video-container">
                    <iframe id="yt-player" src="https://www.youtube.com/embed/zN97v_2vT9U?enablejsapi=1" frameborder="0"></iframe>
                </div>
            </div>
            <button id="claimBtn" class="btn btn-info w-100 rounded-pill fw-bold" style="display:none">🎉 KLAIM POIN</button>
        </div>

        <div id="tab-baca" class="tab-content animate__animated animate__fadeIn">
            <h5 class="mb-3">Bacaan Santai</h5>
            <div class="card-asik">
                <h6 class="text-info">Cerpen: Malam di Jerowaru</h6>
                <p style="font-size: 0.9rem; color: #cbd5e1;">Di bawah langit malam Lombok Timur, Asrul sedang merancang masa depan...</p>
                <small class="text-muted">Baca selengkapnya...</small>
            </div>
            </div>

        <div id="tab-profil" class="tab-content animate__animated animate__fadeIn">
            <div class="text-center mt-4">
                <div class="mb-3">
                    <i class="fas fa-user-circle fa-4x text-accent"></i>
                </div>
                <h5 id="display-name">User Anonim</h5>
                <p id="user-id" class="small text-muted">ID: ---</p>
                <hr style="border-color: var(--glass-border)">
                <div class="d-grid gap-2">
                    <button class="btn btn-outline-light btn-sm rounded-pill"><i class="fas fa-history me-2"></i>Riwayat Reward</button>
                    <button class="btn btn-outline-danger btn-sm rounded-pill"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tab-video', this)">
            <i class="fas fa-play-circle"></i>
            <span>Nonton</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-baca', this)">
            <i class="fas fa-book-open"></i>
            <span>Baca</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-profil', this)">
            <i class="fas fa-user"></i>
            <span>Profil</span>
        </div>
    </nav>
</div>

<script>
    // Logika Ganti Tab
    function switchTab(tabId, element) {
        // Hilangkan class active di semua tab & nav
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        // Aktifkan yang dipilih
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    // Integrasi Firebase kamu masukkan di sini seperti sebelumnya
    // Pastikan database URL dan API Key benar agar poin muncul di header
</script>

</body>
</html>
