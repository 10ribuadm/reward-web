<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NontonAsik - TikTok Style Full Sound</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        
        /* Layar Awal (Kunci Suara) */
        #start-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-start {
            background: #fe2c55; color: white; border: none; padding: 15px 40px;
            border-radius: 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px rgba(254, 44, 85, 0.5);
        }

        .swiper { width: 100%; height: 100vh; display: none; } /* Sembunyi sebelum klik start */
        .swiper-slide { position: relative; background: #000; }

        .video-container { width: 100%; height: 100%; display: flex; align-items: center; }
        .video-container iframe { width: 100vw; height: 100vh; border: none; pointer-events: none; }

        /* UI TikTok */
        .tiktok-ui {
            position: absolute; inset: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 40%);
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
        }

        .video-data { margin-bottom: 20px; pointer-events: auto; }
        .username { font-weight: bold; margin-bottom: 5px; }
        .description { font-size: 0.9rem; opacity: 0.9; }

        .side-bar {
            position: absolute; right: 10px; bottom: 120px;
            display: flex; flex-direction: column; align-items: center; gap: 20px; pointer-events: auto;
        }
        .action-item { text-align: center; }
        .action-item i { font-size: 1.8rem; margin-bottom: 5px; }
        .action-item span { font-size: 0.7rem; }

        /* Tombol Klaim Poin */
        .btn-claim {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            background: #03dac6; color: #000; border: none; padding: 15px 25px;
            border-radius: 10px; font-weight: bold; z-index: 100; display: none; pointer-events: auto;
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <h2 class="mb-4">Nonton<span style="color:#fe2c55">Asik</span></h2>
    <button class="btn-start" onclick="startApp()">MULAI NONTON</button>
    <p style="margin-top: 15px; font-size: 0.8rem; opacity: 0.6;">Klik untuk mengaktifkan suara otomatis</p>
</div>

<div class="swiper mySwiper">
    <div class="swiper-wrapper" id="video-wrapper">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
    // === KONFIGURASI FIREBASE ASRUL ===
    const firebaseConfig = {
        apiKey: "AIzaSyD_5ct08uYoMVSualfGPW8Oiq4y7C9SzJc",
        authDomain: "nontonhepi-4d7a9.firebaseapp.com",
        databaseURL: "https://nontonhepi-4d7a9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nontonhepi-4d7a9",
        storageBucket: "nontonhepi-4d7a9.appspot.com",
        messagingSenderId: "413442384337",
        appId: "1:413442384337:web:af92bdc26bc0adb32440f0",
        measurementId: "G-PV4T810FRW"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    let players = {};
    let swiper;

    const videoData = [
        { id: "w9k2WhcKl80", user: "@lucu_banget", desc: "Ketawa part 1 😂" },
        { id: "FETd9b-pxks", user: "@warga_62", desc: "Momen random sedunia wkwk" },
        { id: "lifSYNqCXo0", user: "@bocil_kocak", desc: "Tahan tawa challenge" },
        { id: "F7AtzYJPxG8", user: "@hiburan_malam", desc: "Receh banget asli!" }
    ];

    function startApp() {
        document.getElementById('start-overlay').style.display = 'none';
        document.querySelector('.mySwiper').style.display = 'block';
        
        // Putar video pertama dengan suara
        if (players[0]) {
            players[0].unMute();
            players[0].playVideo();
        }
    }

    // Render HTML Slides
    const wrapper = document.getElementById('video-wrapper');
    videoData.forEach((v, i) => {
        wrapper.innerHTML += `
            <div class="swiper-slide">
                <div class="video-container"><div id="player-${i}"></div></div>
                <button class="btn-claim" id="claim-${i}" onclick="claimPoint('${i}')">💰 KLAIM 10 POIN</button>
                <div class="tiktok-ui">
                    <div class="side-bar">
                        <div style="width:45px; height:45px; background:#444; border-radius:50%; border:2px solid #fff; margin-bottom:10px;"></div>
                        <div class="action-item"><i class="fas fa-heart"></i><span>9.5K</span></div>
                        <div class="action-item"><i class="fas fa-comment"></i><span>210</span></div>
                        <div class="action-item"><i class="fas fa-share"></i><span>Share</span></div>
                    </div>
                    <div class="video-data">
                        <div class="username">${v.user}</div>
                        <div class="description">${v.desc}</div>
                        <div style="color:#03dac6; font-size:0.8rem; margin-top:5px;">
                            <i class="fas fa-coins"></i> Dompet: <span class="pts-val">0</span> Poin
                        </div>
                    </div>
                </div>
            </div>`;
    });

    function onYouTubeIframeAPIReady() {
        videoData.forEach((v, i) => {
            players[i] = new YT.Player(`player-${i}`, {
                videoId: v.id,
                playerVars: { 'autoplay': 0, 'controls': 0, 'modestbranding': 1, 'loop': 1, 'playlist': v.id },
                events: { 'onStateChange': (e) => { if(e.data == YT.PlayerState.ENDED) document.getElementById(`claim-${i}`).style.display = 'block'; } }
            });
        });
        initSwiper();
    }

    function initSwiper() {
        swiper = new Swiper(".mySwiper", {
            direction: "vertical",
            on: {
                slideChange: function () {
                    Object.values(players).forEach(p => p.pauseVideo());
                    let active = swiper.activeIndex;
                    if (players[active]) {
                        players[active].unMute(); // Suara Langsung ON!
                        players[active].playVideo();
                    }
                }
            }
        });
    }

    // Logika Firebase
    auth.onAuthStateChanged(user => {
        if (user) { currentUser = user; loadPoints(user.uid); }
        else { auth.signInAnonymously(); }
    });

    function loadPoints(uid) {
        db.ref('users/' + uid).on('value', snap => {
            const p = snap.val() ? snap.val().points : 0;
            document.querySelectorAll('.pts-val').forEach(el => el.innerText = p);
        });
    }

    function claimPoint(index) {
        if (currentUser) {
            db.ref('users/' + currentUser.uid + '/points').transaction(c => (c || 0) + 10)
            .then(() => {
                document.getElementById(`claim-${index}`).style.display = 'none';
                swiper.slideNext();
            });
        }
    }
</script>
</body>
</html>
