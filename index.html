<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NontonAsik - Shorts Swipe</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Poppins', sans-serif; overflow: hidden; }
        
        /* Container Swiper Full Screen */
        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { position: relative; background: #000; display: flex; align-items: center; justify-content: center; }

        /* Video Iframe Style */
        .video-container { width: 100%; height: 100%; position: relative; }
        iframe { width: 100%; height: 100%; pointer-events: none; }

        /* Overlay UI */
        .ui-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 50%, rgba(0,0,0,0.3) 100%);
            z-index: 10; padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            pointer-events: none;
        }

        .header-info { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .points-badge { background: rgba(3, 218, 198, 0.2); border: 1px solid #03dac6; padding: 5px 15px; border-radius: 20px; color: #03dac6; font-weight: 700; }
        
        .video-info { margin-bottom: 50px; pointer-events: auto; }
        
        /* Tombol Klaim */
        .btn-claim {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #03dac6; color: #000; border: none; padding: 15px 30px; border-radius: 50px;
            font-weight: 700; z-index: 100; display: none; pointer-events: auto;
            box-shadow: 0 0 30px rgba(3, 218, 198, 0.5);
        }

        #mute-notice {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6); color: white; padding: 10px 20px; border-radius: 10px;
            z-index: 50; display: block; text-align: center;
        }
    </style>
</head>
<body>

<div id="mute-notice" onclick="unmuteAll()"><i class="fas fa-volume-mute mb-2 d-block fa-2x"></i> Ketuk untuk Suara</div>

<div class="swiper mySwiper">
    <div class="swiper-wrapper" id="video-wrapper">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
    // === KONFIGURASI FIREBASE ANDA ===
    const firebaseConfig = {
        apiKey: "AIzaSyD_5ct08uYoMVSualfGPW8Oiq4y7C9SzJc",
        authDomain: "nontonhepi-4d7a9.firebaseapp.com",
        databaseURL: "https://nontonhepi-4d7a9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nontonhepi-4d7a9",
        storageBucket: "nontonhepi-4d7a9.appspot.com",
        messagingSenderId: "413442384337",
        appId: "1:413442384337:web:af92bdc26bc0adb32440f0",
        measurementId: "G-PV4T810FRW"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    let players = {}; // Objek untuk menyimpan semua player YouTube
    let isMuted = true;

    const shortsList = [
        { id: "w9k2WhcKl80", title: "Video Lucu 1" },
        { id: "BbT3BHpKIvg", title: "Video Lucu 2" },
        { id: "lifSYNqCXo0", title: "Video Lucu 3" },
        { id: "F7AtzYJPxG8", title: "Video Lucu 4" }
    ];

    // 1. Render Slides
    const wrapper = document.getElementById('video-wrapper');
    shortsList.forEach((v, index) => {
        wrapper.innerHTML += `
            <div class="swiper-slide">
                <div class="video-container"><div id="player-${index}"></div></div>
                <div class="ui-overlay">
                    <div class="header-info">
                        <h4 class="m-0 fw-bold">Nonton<span style="color:#03dac6">Asik</span></h4>
                        <div class="points-badge"><i class="fas fa-coins"></i> <span class="pts-val">0</span></div>
                    </div>
                    <div class="video-info">
                        <h6>${v.title}</h6>
                        <p class="small opacity-75">Swipe up untuk video lainnya!</p>
                    </div>
                </div>
                <button class="btn-claim" id="claim-${index}" onclick="claimPoint('${index}')">🎉 KLAIM 10 POIN</button>
            </div>`;
    });

    // 2. Inisialisasi YouTube API
    function onYouTubeIframeAPIReady() {
        shortsList.forEach((v, index) => {
            players[index] = new YT.Player(`player-${index}`, {
                videoId: v.id,
                playerVars: { 'autoplay': 0, 'controls': 0, 'modestbranding': 1, 'loop': 1, 'playlist': v.id },
                events: { 'onStateChange': (e) => onPlayerStateChange(e, index) }
            });
        });
        initSwiper();
    }

    // 3. Inisialisasi Swiper (Vertical)
    let swiper;
    function initSwiper() {
        swiper = new Swiper(".mySwiper", {
            direction: "vertical",
            on: {
                slideChange: function () {
                    stopAllVideos();
                    let currentIdx = swiper.activeIndex;
                    if (players[currentIdx]) {
                        if (!isMuted) players[currentIdx].unMute();
                        players[currentIdx].playVideo();
                    }
                }
            }
        });
    }

    function stopAllVideos() {
        Object.values(players).forEach(p => p.pauseVideo());
    }

    function unmuteAll() {
        isMuted = false;
        document.getElementById('mute-notice').style.display = 'none';
        players[swiper.activeIndex].unMute();
        players[swiper.activeIndex].playVideo();
    }

    function onPlayerStateChange(event, index) {
        if (event.data == YT.PlayerState.ENDED) {
            document.getElementById(`claim-${index}`).style.display = 'block';
        }
    }

    // 4. Logika Poin & Auth
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            loadPoints(user.uid);
        } else { auth.signInAnonymously(); }
    });

    function loadPoints(uid) {
        db.ref('users/' + uid).on('value', snap => {
            const p = snap.val() ? snap.val().points : 0;
            document.querySelectorAll('.pts-val').forEach(el => el.innerText = p);
        });
    }

    function claimPoint(index) {
        if (currentUser) {
            db.ref('users/' + currentUser.uid + '/points').transaction(c => (c || 0) + 10)
            .then(() => {
                document.getElementById(`claim-${index}`).style.display = 'none';
                swiper.slideNext(); // Pindah ke video berikutnya otomatis
            });
        }
    }
</script>
</body>
</html>
