<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NontonAsik - Video Lucu HD</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --accent: #03dac6;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: white;
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            position: relative;
        }

        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .points-box {
            background: var(--glass);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid var(--accent);
            font-weight: 700;
            color: var(--accent);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 100px;
        }

        /* Video List Style */
        .video-item {
            background: var(--glass);
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .video-item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .video-info { padding: 12px; }
        .video-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; }

        /* Full Screen Player Overlay */
        #playerOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 3000;
            display: none;
            flex-direction: column;
        }

        .close-player {
            position: absolute;
            top: 20px; right: 20px;
            color: white; font-size: 1.5rem;
            z-index: 3100;
        }

        #ytPlayerContainer { flex: 1; width: 100%; }

        .bottom-nav {
            position: absolute;
            bottom: 20px; left: 20px; right: 20px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item { color: #64748b; text-align: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.3rem; }
        .nav-item span { display: block; font-size: 0.7rem; }

        #loadingOverlay {
            position: absolute; inset: 0; background: var(--bg-dark);
            z-index: 4000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="loadingOverlay">
        <div class="spinner-border text-info mb-3"></div>
        <p>Menghubungkan ke NontonAsik...</p>
    </div>

    <div id="playerOverlay">
        <i class="fas fa-times close-player" onclick="closeVideo()"></i>
        <div id="ytPlayerContainer"></div>
        <div class="p-3 text-center">
            <button id="claimBtn" class="btn btn-info w-100 rounded-pill fw-bold py-3 animate__animated" onclick="claimReward()" style="display:none">
                🎉 AMBIL 10 POIN SEKARANG!
            </button>
        </div>
    </div>

    <header>
        <h5 class="m-0 fw-bold">Nonton<span style="color:var(--accent)">Asik</span></h5>
        <div class="points-box">
            <i class="fas fa-coins me-1"></i> <span id="points">0</span>
        </div>
    </header>

    <div class="main-content">
        <div id="tab-nonton" class="tab-panel active">
            <h6 class="mb-3">Pilih Video Lucu HD</h6>
            <div id="videoList">
                </div>
        </div>

        <div id="tab-baca" class="tab-panel" style="display:none">
            <h6 class="mb-3">Bacaan Ringan</h6>
            <div class="video-item p-3">
                <h5>Segera Hadir</h5>
                <p class="small opacity-50">Konten bacaan sedang disiapkan...</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tab-nonton', this)">
            <i class="fas fa-play-circle"></i><span>Nonton</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-baca', this)">
            <i class="fas fa-book-open"></i><span>Baca</span>
        </div>
    </nav>
</div>

<script>
    // === FIREBASE CONFIG (Sesuai milik Anda) ===
    const firebaseConfig = {
        apiKey: "AIzaSyD_5ct08uYoMVSualfGPW8Oiq4y7C9SzJc",
        authDomain: "nontonhepi-4d7a9.firebaseapp.com",
        databaseURL: "https://nontonhepi-4d7a9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nontonhepi-4d7a9",
        storageBucket: "nontonhepi-4d7a9.appspot.com",
        messagingSenderId: "413442384337",
        appId: "1:413442384337:web:af92bdc26bc0adb32440f0",
        measurementId: "G-PV4T810FRW"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let player;
    let currentUser = null;
    let hasClaimed = false;

    // List Video Lucu HD (Bisa Anda pindahkan ke Firebase nanti)
    const videos = [
        { id: "JqRKOLM9u8o", title: "Momen Kocak Bikin Ngakak 2025", thumb: "https://img.youtube.com/vi/JqRKOLM9u8o/mqdefault.jpg" },
        { id: "kXPctLfbiJo", title: "Si Paling Random - Kompilasi HD", thumb: "https://img.youtube.com/vi/kXPctLfbiJo/mqdefault.jpg" },
        { id: "6sXPAyV_LV8", title: "20 Menit Kucing Lucu HD", thumb: "https://img.youtube.com/vi/6sXPAyV_LV8/mqdefault.jpg" },
        { id: "NAq-TWX3HOA", title: "Kegabutan Pria Paling Ngakak", thumb: "https://img.youtube.com/vi/NAq-TWX3HOA/mqdefault.jpg" }
    ];

    // Auth Change
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('loadingOverlay').style.display = 'none';
            loadUserPoints(user.uid);
            renderVideoList();
        } else {
            auth.signInAnonymously();
        }
    });

    function loadUserPoints(uid) {
        db.ref('users/' + uid).on('value', snap => {
            document.getElementById('points').innerText = snap.val() ? snap.val().points : 0;
        });
    }

    function renderVideoList() {
        const list = document.getElementById('videoList');
        list.innerHTML = '';
        videos.forEach(v => {
            list.innerHTML += `
                <div class="video-item animate__animated animate__fadeInUp" onclick="playVideo('${v.id}')">
                    <img src="${v.thumb}">
                    <div class="video-info">
                        <div class="video-title">${v.title}</div>
                        <small class="text-info"><i class="fas fa-play me-1"></i> Tonton & Dapat 10 Poin</small>
                    </div>
                </div>`;
        });
    }

    // YouTube Player Logic
    function onYouTubeIframeAPIReady() {}

    function playVideo(videoId) {
        hasClaimed = false;
        document.getElementById('claimBtn').style.display = 'none';
        document.getElementById('playerOverlay').style.display = 'flex';
        
        if (player) {
            player.loadVideoById(videoId);
        } else {
            player = new YT.Player('ytPlayerContainer', {
                height: '100%', width: '100%', videoId: videoId,
                playerVars: { 'autoplay': 1, 'controls': 1, 'modestbranding': 1 },
                events: { 'onStateChange': (e) => { if(e.data == YT.PlayerState.ENDED) showClaim(); } }
            });
        }
    }

    function showClaim() {
        document.getElementById('claimBtn').style.display = 'block';
        document.getElementById('claimBtn').classList.add('animate__tada');
    }

    function closeVideo() {
        if(player) player.stopVideo();
        document.getElementById('playerOverlay').style.display = 'none';
    }

    function claimReward() {
        if (currentUser && !hasClaimed) {
            hasClaimed = true;
            const userRef = db.ref('users/' + currentUser.uid + '/points');
            userRef.transaction(c => (c || 0) + 10).then(() => {
                alert("Poin Berhasil Ditambahkan!");
                closeVideo();
            });
        }
    }

    function switchTab(id, el) {
        document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        el.classList.add('active');
    }
</script>
</body>
</html>
