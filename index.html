<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NontonHepi - Modern Shorts</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6200ee; --accent: #03dac6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }

        /* Overlay Awal */
        #start-overlay {
            position: fixed; inset: 0; background: #121212; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-start {
            background: var(--primary); color: white; border: none; padding: 18px 45px;
            border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 8px 24px rgba(98, 0, 238, 0.4);
        }

        /* Container Utama */
        #app-container { display: none; width: 100%; height: 100%; }
        .video-wrapper { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Play/Pause Icon Animation */
        .play-status-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 5rem; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .show-icon { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }

        /* UI Overlay */
        .ui-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px 20px 50px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            pointer-events: none;
        }
        .user-info h3 { margin: 0 0 8px; font-size: 1.2rem; color: var(--accent); }
        .user-info p { margin: 0; font-size: 0.95rem; opacity: 0.8; line-height: 1.5; }

        /* Dompet Poin */
        .wallet-card {
            position: absolute; top: 50px; right: 20px;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
            padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 8px; font-weight: 600;
        }

        /* Progress Bar */
        .progress-bar {
            position: absolute; bottom: 0; left: 0; height: 4px;
            background: var(--accent); width: 0%; transition: width 0.1s linear;
        }

        /* Tombol Klaim */
        .btn-claim {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--accent); color: #000; border: none; padding: 20px 40px;
            border-radius: 50px; font-weight: 800; font-size: 1rem; cursor: pointer;
            display: none; pointer-events: auto; box-shadow: 0 0 30px rgba(3, 218, 198, 0.5);
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="font-size: 2.5rem; margin-bottom: 30px;">Nonton<span style="color:var(--accent)">Hepi</span></h1>
    <button class="btn-start" onclick="initApp()">MASUK APLIKASI</button>
</div>

<div id="app-container">
    <div class="video-wrapper" onclick="togglePlay()">
        <video id="mainVideo" playsinline>
            <source id="videoSource" src="" type="video/mp4">
        </video>
        <i id="playIcon" class="fas fa-play play-status-icon"></i>
        
        <div class="wallet-card">
            <i class="fas fa-coins" style="color: gold;"></i>
            <span id="pts-val">0</span> Poin
        </div>

        <button id="claimBtn" class="btn-claim" onclick="claimReward()">🎁 KLAIM 10 POIN</button>

        <div class="ui-overlay">
            <div class="user-info">
                <h3 id="videoTitle">@NontonHepi_User</h3>
                <p id="videoDesc">Menonton video seru dan dapatkan poin setiap hari!</p>
            </div>
        </div>
        <div class="progress-bar" id="progressBar"></div>
    </div>
</div>

<script>
    // === KONFIGURASI FIREBASE ANDA ===
    const firebaseConfig = {
        apiKey: "AIzaSyD_5ct08uYoMVSualfGPW8Oiq4y7C9SzJc",
        authDomain: "nontonhepi-4d7a9.firebaseapp.com",
        databaseURL: "https://nontonhepi-4d7a9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nontonhepi-4d7a9",
        storageBucket: "nontonhepi-4d7a9.appspot.com",
        messagingSenderId: "413442384337",
        appId: "1:413442384337:web:af92bdc26bc0adb32440f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // === DATA VIDEO (MP4 LANGSUNG - LEBIH RINGAN) ===
    const playlist = [
        { url: "https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-light-32734-large.mp4", title: "@Creative_Mind", desc: "Seni cahaya neon yang luar biasa! ✨" },
        { url: "https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-leaves-low-angle-shot-4606-large.mp4", title: "@Nature_Vibes", desc: "Keindahan musim gugur yang menenangkan. 🍂" },
        { url: "https://assets.mixkit.co/videos/preview/mixkit-curvy-road-in-the-mountains-4601-large.mp4", title: "@Travel_Addict", desc: "Perjalanan tak terlupakan di pegunungan. 🏔️" }
    ];

    let currentIdx = 0;
    const video = document.getElementById('mainVideo');
    const playIcon = document.getElementById('playIcon');
    const progressBar = document.getElementById('progressBar');
    const claimBtn = document.getElementById('claimBtn');
    let userId = null;

    function initApp() {
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        loadVideo(0);
    }

    function loadVideo(index) {
        currentIdx = index;
        const data = playlist[index];
        document.getElementById('videoSource').src = data.url;
        document.getElementById('videoTitle').innerText = data.title;
        document.getElementById('videoDesc').innerText = data.desc;
        claimBtn.style.display = 'none';
        video.load();
        video.play();
    }

    function togglePlay() {
        if (video.paused) {
            video.play();
            showPlayIcon('fa-play', false);
        } else {
            video.pause();
            showPlayIcon('fa-pause', true);
        }
    }

    function showPlayIcon(iconClass, keepShowing) {
        playIcon.className = `fas ${iconClass} play-status-icon show-icon`;
        if (!keepShowing) {
            setTimeout(() => playIcon.classList.remove('show-icon'), 500);
        }
    }

    // Tracking Progress
    video.ontimeupdate = () => {
        const pct = (video.currentTime / video.duration) * 100;
        progressBar.style.width = pct + "%";
    };

    video.onended = () => {
        claimBtn.style.display = 'block';
    };

    // Firebase Logic
    auth.onAuthStateChanged(user => {
        if (user) { 
            userId = user.uid;
            db.ref('users/' + userId + '/points').on('value', snap => {
                document.getElementById('pts-val').innerText = snap.val() || 0;
            });
        } else { auth.signInAnonymously(); }
    });

    function claimReward() {
        if (userId) {
            db.ref('users/' + userId + '/points').transaction(c => (c || 0) + 10)
            .then(() => {
                alert("🎉 +10 Poin Berhasil!");
                let next = (currentIdx + 1) % playlist.length;
                loadVideo(next);
            });
        }
    }
</script>
</body>
</html>
